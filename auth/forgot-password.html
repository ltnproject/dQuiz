<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — dQuiz</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; z-index: 1; }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo a { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
    .auth-logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .auth-logo-title { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.8rem; }
    .success-state { text-align: center; display: none; }
    .success-icon { font-size: 4rem; margin-bottom: 16px; }
    #error-msg { display: none; }
  </style>
</head>
<body>
  <div class="blob-wrap"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <a href="/index.html">
          <div class="auth-logo-icon">⚡</div>
          <span class="auth-logo-title gradient-text">dQuiz</span>
        </a>
      </div>
      <div class="card">
        <div id="form-state">
          <h1 style="font-size:1.6rem;margin-bottom:8px">Reset password</h1>
          <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:24px">Enter your email and we'll send a reset link.</p>
          <div id="error-msg" class="alert alert-error mb-16"></div>
          <form id="reset-form" style="display:flex;flex-direction:column;gap:16px">
            <div class="input-wrap">
              <label class="input-label">Email</label>
              <div class="input-icon-wrap">
                <span class="input-icon">✉</span>
                <input type="email" id="email" class="input-field" placeholder="you@example.com" required />
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Send Reset Link</button>
            <a href="/auth/login.html" style="text-align:center;font-size:0.875rem;color:var(--text-muted);text-decoration:none">← Back to sign in</a>
          </form>
        </div>
        <div class="success-state" id="success-state">
          <div class="success-icon">✅</div>
          <h2 style="margin-bottom:8px">Check your email</h2>
          <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:24px">We sent a reset link to <strong id="sent-email"></strong></p>
          <a href="/auth/login.html" class="btn btn-primary btn-full">Back to Sign In</a>
        </div>
      </div>
    </div>
  </div>
  <script type="module">
    import { auth } from '/assets/js/firebase-init.js';
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const form = document.getElementById('reset-form');
    const errorMsg = document.getElementById('error-msg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        await sendPasswordResetEmail(auth, email);
        document.getElementById('sent-email').textContent = email;
        document.getElementById('form-state').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'flex';
        btn.disabled = false; btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>

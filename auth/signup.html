<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — dQuiz</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; z-index: 1; }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo a { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
    .auth-logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .auth-logo-title { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.8rem; }
    .auth-heading { text-align: center; margin-bottom: 28px; }
    .auth-heading h1 { font-size: 1.8rem; margin-bottom: 6px; }
    .auth-heading p { color: var(--text-muted); font-size: 0.9rem; }
    .google-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif; }
    .google-btn:hover { background: rgba(255,255,255,0.08); }
    .form-fields { display: flex; flex-direction: column; gap: 16px; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.875rem; color: var(--text-muted); }
    .auth-footer a { color: #A29BFE; text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { color: white; }
    .terms { font-size: 0.75rem; color: var(--text-muted); text-align: center; line-height: 1.5; }
    .terms a { color: #A29BFE; text-decoration: none; }
    #error-msg { display: none; }
  </style>
</head>
<body>
  <div class="blob-wrap"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <a href="/index.html">
          <div class="auth-logo-icon">⚡</div>
          <span class="auth-logo-title gradient-text">dQuiz</span>
        </a>
      </div>

      <div class="auth-heading">
        <h1>Create account</h1>
        <p>Start your quiz journey for free</p>
      </div>

      <div class="card">
        <div id="error-msg" class="alert alert-error mb-16"></div>

        <button class="google-btn" id="google-btn">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <div class="divider">or</div>

        <form class="form-fields" id="signup-form">
          <div class="input-wrap">
            <label class="input-label">Username</label>
            <div class="input-icon-wrap">
              <span class="input-icon">👤</span>
              <input type="text" id="username" class="input-field" placeholder="CoolPlayer42" required minlength="3" maxlength="20" />
            </div>
          </div>
          <div class="input-wrap">
            <label class="input-label">Email</label>
            <div class="input-icon-wrap">
              <span class="input-icon">✉</span>
              <input type="email" id="email" class="input-field" placeholder="you@example.com" required autocomplete="email" />
            </div>
          </div>
          <div class="input-wrap">
            <label class="input-label">Password</label>
            <div class="input-icon-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" class="input-field input-field-right" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password" />
              <button type="button" class="input-toggle" id="toggle-pass">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Create Account</button>
          <p class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="/auth/login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db, googleProvider } from '/assets/js/firebase-init.js';
    import { redirectIfAuthed } from '/assets/js/utils.js';
    import {
      createUserWithEmailAndPassword,
      updateProfile,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    redirectIfAuthed(auth, '/dashboard.html');

    const errorMsg = document.getElementById('error-msg');
    const togglePass = document.getElementById('toggle-pass');
    const passEl = document.getElementById('password');

    togglePass.addEventListener('click', () => {
      const type = passEl.type === 'password' ? 'text' : 'password';
      passEl.type = type;
      togglePass.textContent = type === 'password' ? '👁' : '🙈';
    });

    function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'flex'; }

    async function createProfile(uid, username, email, photoURL = '') {
      await setDoc(doc(db, 'users', uid), {
        uid, username, email, photoURL,
        role: 'user', xp: 0, level: 1,
        gamesPlayed: 0, gamesHosted: 0, wins: 0,
        createdAt: serverTimestamp()
      });
    }

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passEl.value;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Creating account…';
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: username });
        await createProfile(cred.user.uid, username, email);
        window.location.href = '/dashboard.html';
      } catch (err) {
        const map = {
          'auth/email-already-in-use': 'That email is already registered.',
          'auth/weak-password': 'Password must be at least 6 characters.',
          'auth/invalid-email': 'Please enter a valid email address.',
        };
        showError(map[err.code] || err.message);
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
      errorMsg.style.display = 'none';
      try {
        const cred = await signInWithPopup(auth, googleProvider);
        const u = cred.user;
        const snap = await getDoc(doc(db, 'users', u.uid));
        if (!snap.exists()) {
          await createProfile(u.uid, u.displayName || 'Player', u.email || '', u.photoURL || '');
        }
        window.location.href = '/dashboard.html';
      } catch (err) {
        showError(err.message);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discover — dQuiz</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    .discover-hero { padding: 48px 0 32px; text-align: center; }
    .discover-hero h1 { font-size: 2.4rem; margin-bottom: 10px; }
    .discover-hero p { color: var(--text-muted); font-size: 1rem; max-width: 520px; margin: 0 auto 28px; }
    .search-wrap { max-width: 560px; margin: 0 auto; position: relative; }
    .search-wrap .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }
    .search-wrap input { padding-left: 46px; font-size: 1rem; height: 52px; border-radius: 14px; }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin: 24px 0; }
    .filter-chip { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--text-muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .filter-chip:hover { border-color: var(--primary); color: #A29BFE; }
    .filter-chip.active { background: rgba(108,92,231,0.2); border-color: var(--primary); color: #A29BFE; }
    .quiz-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; transition: all 0.2s; }
    .quiz-card:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(108,92,231,0.2); }
    .quiz-card-cover { height: 110px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; }
    .quiz-card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .quiz-card-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .quiz-card-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .quiz-card-meta { display: flex; align-items: center; gap: 10px; font-size: 0.78rem; color: var(--text-muted); flex-wrap: wrap; }
    .quiz-card-actions { display: flex; gap: 8px; margin-top: auto; padding-top: 12px; }
    .sort-select { padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.85rem; }
    .results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
  <div class="blob-wrap"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
  <div id="navbar" class="navbar"></div>
  <div class="page-content">
    <div class="container">

      <!-- Hero search -->
      <div class="discover-hero">
        <h1>Discover <span class="gradient-text">Quizzes</span></h1>
        <p>Browse thousands of community-created quizzes. Host one instantly with a single click.</p>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search" class="input-field" placeholder="Search by title, topic, creator…" />
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar" id="filter-bar">
        <button class="filter-chip active" data-cat="">All</button>
        <button class="filter-chip" data-cat="Science">🔬 Science</button>
        <button class="filter-chip" data-cat="History">📜 History</button>
        <button class="filter-chip" data-cat="Math">➗ Math</button>
        <button class="filter-chip" data-cat="Geography">🌍 Geography</button>
        <button class="filter-chip" data-cat="Sports">⚽ Sports</button>
        <button class="filter-chip" data-cat="Music">🎵 Music</button>
        <button class="filter-chip" data-cat="Movies">🎬 Movies</button>
        <button class="filter-chip" data-cat="Gaming">🎮 Gaming</button>
        <button class="filter-chip" data-cat="Food">🍕 Food</button>
        <button class="filter-chip" data-cat="Tech">💻 Tech</button>
        <button class="filter-chip" data-cat="General">❓ General</button>
      </div>

      <!-- Results bar -->
      <div class="results-bar">
        <div style="font-size:0.9rem;color:var(--text-muted)"><span id="results-count">—</span> quizzes found</div>
        <select class="sort-select" id="sort-select">
          <option value="plays">Most Played</option>
          <option value="likes">Most Liked</option>
          <option value="newest">Newest</option>
          <option value="questions">Most Questions</option>
        </select>
      </div>

      <!-- Grid -->
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;padding-bottom:60px" id="quiz-grid">
        <!-- Skeleton loaders -->
        ${Array(8).fill(0).map(() => `
          <div class="quiz-card">
            <div class="quiz-card-cover skeleton" style="opacity:0.3"></div>
            <div class="quiz-card-body">
              <div class="skeleton" style="height:18px;width:70%"></div>
              <div class="skeleton" style="height:12px;width:90%;margin-top:4px"></div>
              <div class="skeleton" style="height:12px;width:60%;margin-top:2px"></div>
            </div>
          </div>
        `).join('')}
      </div>

    </div>
  </div>

  <script type="module">
    import { auth, db } from '/assets/js/firebase-init.js';
    import { initNavbar } from '/assets/js/utils.js';
    import {
      collection, query, where, orderBy, limit, getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    initNavbar(auth, db, 'discover');

    let allQuizzes = [];
    let activeCategory = '';
    let sortBy = 'plays';
    let searchTerm = '';

    async function loadQuizzes() {
      const q = query(
        collection(db, 'quizSets'),
        where('visibility', '==', 'public'),
        orderBy('plays', 'desc'),
        limit(100)
      );
      const snap = await getDocs(q);
      allQuizzes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    }

    function render() {
      let filtered = allQuizzes.filter(q => {
        const matchSearch = !searchTerm || q.title?.toLowerCase().includes(searchTerm) || q.description?.toLowerCase().includes(searchTerm) || q.creatorName?.toLowerCase().includes(searchTerm);
        const matchCat = !activeCategory || q.category === activeCategory;
        return matchSearch && matchCat;
      });

      // Sort
      filtered.sort((a, b) => {
        if (sortBy === 'plays') return (b.plays||0) - (a.plays||0);
        if (sortBy === 'likes') return (b.likes||0) - (a.likes||0);
        if (sortBy === 'newest') return (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0);
        if (sortBy === 'questions') return (b.questionCount||0) - (a.questionCount||0);
        return 0;
      });

      document.getElementById('results-count').textContent = filtered.length;

      const grid = document.getElementById('quiz-grid');
      if (!filtered.length) {
        grid.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:80px 24px">
            <div style="font-size:3rem;margin-bottom:16px">🔍</div>
            <h3 style="margin-bottom:8px">No quizzes found</h3>
            <p style="color:var(--text-muted);font-size:0.9rem">Try adjusting your search or category filter.</p>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map(q => {
        const gradients = [
          'linear-gradient(135deg,#6C5CE7,#A29BFE)',
          'linear-gradient(135deg,#00B894,#00D2FF)',
          'linear-gradient(135deg,#FDCB6E,#e17055)',
          'linear-gradient(135deg,#FF4757,#A29BFE)',
          'linear-gradient(135deg,#00D2FF,#6C5CE7)',
        ];
        const grad = gradients[Math.abs(q.id.charCodeAt(0)) % gradients.length];
        return `
          <div class="quiz-card">
            <div class="quiz-card-cover" style="background:${grad};opacity:0.85">${q.emoji || '📝'}</div>
            <div class="quiz-card-body">
              <div class="quiz-card-title" title="${q.title}">${q.title}</div>
              ${q.description ? `<div class="quiz-card-desc">${q.description}</div>` : ''}
              <div class="quiz-card-meta">
                <span>📋 ${q.questionCount || 0}q</span>
                <span>▶ ${(q.plays||0).toLocaleString()} plays</span>
                <span>❤ ${q.likes||0}</span>
                <span title="${q.creatorName}">👤 ${q.creatorName?.split(' ')[0] || 'Unknown'}</span>
              </div>
              <div class="quiz-card-actions">
                <a href="/game/host.html?quiz=${q.id}" class="btn btn-primary btn-sm" style="flex:1">▶ Host</a>
                <button class="btn btn-ghost btn-sm like-btn" data-id="${q.id}" title="Like">❤</button>
              </div>
            </div>
          </div>`;
      }).join('');

      // Like buttons
      document.querySelectorAll('.like-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const { doc, updateDoc, increment: inc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
          await updateDoc(doc(db, 'quizSets', btn.dataset.id), { likes: inc(1) });
          btn.textContent = '❤️';
          btn.disabled = true;
        });
      });
    }

    // Search
    let searchTimeout;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => { searchTerm = e.target.value.toLowerCase(); render(); }, 250);
    });

    // Category filter
    document.getElementById('filter-bar').addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeCategory = chip.dataset.cat;
      render();
    });

    // Sort
    document.getElementById('sort-select').addEventListener('change', e => {
      sortBy = e.target.value;
      render();
    });

    await loadQuizzes();
  </script>
</body>
</html>
